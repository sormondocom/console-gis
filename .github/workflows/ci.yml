name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Fast checks (formatting + lint) ─────────────────────────────────────────
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Library test suite ───────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-targets

      - name: Run library tests
        run: cargo test --lib -- --nocapture

  # ── MSRV (Minimum Supported Rust Version) ───────────────────────────────────
  msrv:
    name: MSRV check (1.70)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.70
        uses: dtolnay/rust-toolchain@1.70

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Check (no tests — MSRV only guarantees compilation)
        run: cargo check --all-targets

  # ── Release binaries ─────────────────────────────────────────────────────────
  # Built only on tagged releases (v*.*.*). Artefacts are attached to the
  # GitHub Release that the tag creates.
  release:
    name: Release binary (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, test]
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write   # required to upload release assets

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: console-gis
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: console-gis.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: console-gis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          BIN=target/${{ matrix.target }}/release/${{ matrix.artifact }}
          ARCHIVE=console-gis-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          tar czf "$ARCHIVE" -C "$(dirname $BIN)" "$(basename $BIN)"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bin  = "target\${{ matrix.target }}\release\${{ matrix.artifact }}"
          $zip  = "console-gis-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $zip
          "ARCHIVE=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
