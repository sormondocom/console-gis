<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" width="200" height="230">
  <defs>
    <!-- Globe clip mask -->
    <clipPath id="globe-clip">
      <circle cx="100" cy="100" r="75"/>
    </clipPath>

    <!-- Ocean: radial gradient, light from upper-right -->
    <radialGradient id="ocean" cx="65%" cy="28%" r="65%">
      <stop offset="0%"   stop-color="#1A4FBE"/>
      <stop offset="70%"  stop-color="#0C2878"/>
      <stop offset="100%" stop-color="#040A2A"/>
    </radialGradient>

    <!-- Limb atmosphere glow -->
    <radialGradient id="atm" cx="50%" cy="50%" r="50%">
      <stop offset="82%"  stop-color="transparent" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4488FF"      stop-opacity="0.5"/>
    </radialGradient>

    <!-- Cursor glow -->
    <filter id="cursor-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background panel -->
  <rect width="200" height="230" rx="18" fill="#06060F"/>
  <rect x="1" y="1" width="198" height="228" rx="17" fill="none" stroke="#1A2A4A" stroke-width="1"/>

  <!-- ── Globe ── -->

  <!-- Ocean fill -->
  <circle cx="100" cy="100" r="75" fill="url(#ocean)"/>

  <!-- Latitude lines (clipped to globe)
       Formula: y = 100 − 75·sin(φ°),  half-width = 75·cos(φ°)  -->
  <g clip-path="url(#globe-clip)" fill="none" stroke="#1AADE4" stroke-width="0.7" opacity="0.55">
    <!-- 75°N --> <line x1="80.6" x2="119.4" y1="27.6"  y2="27.6"/>
    <!-- 60°N --> <line x1="62.5" x2="137.5" y1="35.1"  y2="35.1"/>
    <!-- 45°N --> <line x1="47.0" x2="153.0" y1="47.0"  y2="47.0"/>
    <!-- 30°N --> <line x1="35.1" x2="164.9" y1="62.5"  y2="62.5"/>
    <!-- 15°N --> <line x1="27.6" x2="172.4" y1="80.6"  y2="80.6"/>
    <!-- 15°S --> <line x1="27.6" x2="172.4" y1="119.4" y2="119.4"/>
    <!-- 30°S --> <line x1="35.1" x2="164.9" y1="137.5" y2="137.5"/>
    <!-- 45°S --> <line x1="47.0" x2="153.0" y1="153.0" y2="153.0"/>
    <!-- 60°S --> <line x1="62.5" x2="137.5" y1="164.9" y2="164.9"/>
    <!-- 75°S --> <line x1="80.6" x2="119.4" y1="172.4" y2="172.4"/>
  </g>

  <!-- Longitude lines as ellipses (rx = 75·|sin(λ°)|, ry = 75)
       All centred at (100, 100), clipped to globe  -->
  <g clip-path="url(#globe-clip)" fill="none" stroke="#1AADE4" stroke-width="0.7" opacity="0.55">
    <!-- ±15° --> <ellipse cx="100" cy="100" rx="19.4" ry="75"/>
    <!-- ±30° --> <ellipse cx="100" cy="100" rx="37.5" ry="75"/>
    <!-- ±45° --> <ellipse cx="100" cy="100" rx="53.0" ry="75"/>
    <!-- ±60° --> <ellipse cx="100" cy="100" rx="65.0" ry="75"/>
    <!-- ±75° --> <ellipse cx="100" cy="100" rx="72.4" ry="75"/>
    <!-- Prime meridian (0°) -->
    <line x1="100" y1="25" x2="100" y2="175"/>
  </g>

  <!-- Special parallels (clipped) -->
  <g clip-path="url(#globe-clip)" fill="none">
    <!-- Equator — gold -->
    <line x1="25" x2="175" y1="100" y2="100"
          stroke="#FFD700" stroke-width="1.4" opacity="0.95"/>
    <!-- Tropic of Cancer 23.5°N: y = 100−75·sin(23.5°)≈70.1, hw≈68.8 -->
    <line x1="31.2" x2="168.8" y1="70.1" y2="70.1"
          stroke="#FFB030" stroke-width="0.9" opacity="0.7" stroke-dasharray="4 3"/>
    <!-- Tropic of Capricorn 23.5°S: y≈129.9 -->
    <line x1="31.2" x2="168.8" y1="129.9" y2="129.9"
          stroke="#FFB030" stroke-width="0.9" opacity="0.7" stroke-dasharray="4 3"/>
  </g>

  <!-- Atmosphere rim -->
  <circle cx="100" cy="100" r="75" fill="url(#atm)"/>

  <!-- Globe silhouette ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#3D80C4" stroke-width="1.2" opacity="0.8"/>

  <!-- ── Terminal cursor on the globe ──
       Positioned at ~40°N, 0° lon  (Greenwich, UK latitude)
       x = 100 + 75·cos(40°)·sin(0°) = 100
       y = 100 − 75·sin(40°)         ≈ 51.8                        -->
  <g filter="url(#cursor-glow)">
    <!-- Crosshair -->
    <line x1="95" x2="105" y1="51.8" y2="51.8" stroke="#00FF88" stroke-width="0.8" opacity="0.7"/>
    <line x1="100" x2="100" y1="46.8" y2="56.8" stroke="#00FF88" stroke-width="0.8" opacity="0.7"/>
    <!-- Block cursor -->
    <rect x="97" y="48.3" width="6" height="9" fill="#00FF88" opacity="0.92" rx="0.5"/>
  </g>

  <!-- ── Logo text ── -->
  <text x="100" y="196"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="13"
        font-weight="bold"
        letter-spacing="3"
        fill="#7DC4E4">CONSOLE-GIS</text>

  <!-- Version tag -->
  <text x="100" y="214"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9"
        letter-spacing="1"
        fill="#2D5A7A">v0.1.0</text>
</svg>
